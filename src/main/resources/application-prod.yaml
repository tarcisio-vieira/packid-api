server:
  port: 8081
  address: 127.0.0.1
  servlet:
    context-path: /packid
  forward-headers-strategy: framework
  tomcat:
    redirect-context-root: false

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/packid}
    username: ${DB_USER:packid_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    org.springframework.web: INFO

app:
  frontend-url: ${FRONTEND_URL:http://localhost:8080}
