server:
  port: 8080

spring:
  application:
    name: packid-api
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
        provider:
          google:
            issuer-uri: https://accounts.google.com

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: INFO

app:
  frontend-url: ${FRONTEND_URL}

whatsapp:
  enabled: ${WHATSAPP_ENABLED:true}
  apiVersion: ${WHATSAPP_API_VERSION:v21.0}
  phoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:05521979187226}
  accessToken: ${WHATSAPP_ACCESS_TOKEN:}
  templateName: ${WHATSAPP_TEMPLATE_NAME:packid_encomenda_chegou}
  language: ${WHATSAPP_LANGUAGE:pt_BR}

